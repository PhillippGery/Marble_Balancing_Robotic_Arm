###############################################
# MoveIt Servo parameters for UR5e marble balancer
# FLAT YAML — loaded and wrapped as {"moveit_servo": ...} in launch
###############################################

use_gazebo: true

## Incoming commands
command_in_type: "speed_units"   # Our LQR sends actual rad/s, not unitless [-1,1]
scale:
  linear:     0.4
  rotational: 0.8
  joint:      0.5

## Outgoing commands
publish_period: 0.034            # ~30 Hz servo loop
low_latency_mode: false
command_out_type: trajectory_msgs/JointTrajectory
publish_joint_positions: true
publish_joint_velocities: true
publish_joint_accelerations: false
smoothing_filter_plugin_name: "online_signal_smoothing::ButterworthFilterPlugin"

## Planning scene
is_primary_planning_scene_monitor: true

## MoveIt group — THIS is what Humble servo 2.5.x reads (NOT planning_group_name)
move_group_name:  ur_arm
planning_frame:   base_link

## Frames
ee_frame_name:             plate_tcp
robot_link_command_frame:  plate_tcp

## Stopping
incoming_command_timeout: 0.1
num_outgoing_halt_msgs_to_publish: 4

## Singularity / joint-limit handling
lower_singularity_threshold:              17.0
hard_stop_singularity_threshold:          30.0
joint_limit_margin:                        0.1
leaving_singularity_threshold_multiplier:  2.0

## Topic names
cartesian_command_in_topic: ~/delta_twist_cmds
joint_command_in_topic:     ~/delta_joint_cmds
joint_topic:                /joint_states
status_topic:               ~/status
command_out_topic:          /ur7e_arm_controller/joint_trajectory

## Collision checking
check_collisions:                    true
collision_check_rate:                10.0
self_collision_proximity_threshold:  0.01
scene_collision_proximity_threshold: 0.02
